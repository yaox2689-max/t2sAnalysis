services:
  mysql:
    image: mysql:8.0
    container_name: t2s-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: t2s_analysis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: t2s-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: t2s-backend
    restart: unless-stopped
    environment:
      APP_NAME: AI Data Analyst
      APP_VERSION: "0.1.0"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80"]'
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: t2s_analysis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      SQL_TIMEOUT: "10"
      SQL_MAX_ROWS: "500"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
